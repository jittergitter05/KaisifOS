name: Job Scout
on:
  schedule:
    - cron: '30 2 * * 1-5' # 8:00 AM IST (2:30 AM UTC) weekdays
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Install node-fetch
        run: npm i node-fetch dotenv
        working-directory: ./scripts
        
      - name: Run Scout Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_KEY_BASE64: ${{ secrets.GOOGLE_SERVICE_KEY_BASE64 }}
        run: node scripts/scout.js
